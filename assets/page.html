<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>
  :root {
    color-scheme: dark;
    --fg: #e6edf3;
    --muted: #9da7b3;
    --bg: #0d1117;
    --bg-alt: #0a0e14;
    --accent: #58a6ff;
    --border: #30363d;
    --code-bg: #161b22;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    line-height: 1.6;
  }

  /* Two-column layout: sticky TOC sidebar on the left, content on the right. */
  .tmd-layout { display: flex; min-height: 100vh; align-items: flex-start; }

  .tmd-sidebar {
    flex: 0 0 22%;
    max-width: 22%;
    background: var(--bg-alt);
    border-right: 1px solid var(--border);
    padding: 1.2rem 1rem;
    position: sticky;
    top: 0;
    max-height: 100vh;
    overflow-y: auto;
    font-size: 0.9rem;
  }
  .tmd-sidebar h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 0.6rem 0;
    padding: 0;
    border: none;
  }

  .tmd-toc-list { list-style: none; margin: 0; padding: 0; }
  .tmd-toc-list li { margin: 0.1rem 0; line-height: 1.35; }
  .tmd-toc-list a {
    display: block;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    color: var(--fg);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tmd-toc-list a:hover { background: var(--code-bg); color: var(--accent); }
  .tmd-toc-l2 > a { font-weight: 600; }
  .tmd-toc-l3 > a,
  .tmd-toc-l4 > a,
  .tmd-toc-l5 > a,
  .tmd-toc-l6 > a { color: var(--muted); font-size: 0.85rem; }
  .tmd-toc-empty { color: var(--muted); font-style: italic; margin: 0; }

  .tmd-content {
    flex: 1 1 auto;
    min-width: 0;
    padding: 1.2rem 1.6rem;
  }

  h1, h2, h3, h4 {
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.2em;
    scroll-margin-top: 1rem;
  }
  h1 { font-size: 1.8rem; }
  h2 { font-size: 1.4rem; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    background: var(--code-bg);
    padding: 0.1em 0.35em;
    border-radius: 4px;
    font-size: 0.95em;
  }
  pre {
    background: var(--code-bg);
    padding: 1em;
    border-radius: 6px;
    overflow-x: auto;
    border: 1px solid var(--border);
  }
  pre code { background: transparent; padding: 0; }
  blockquote {
    border-left: 3px solid var(--accent);
    margin: 0;
    padding: 0.2em 1em;
    color: var(--muted);
  }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid var(--border); padding: 0.4em 0.8em; }
  img { max-width: 100%; }
  hr { border: none; border-top: 1px solid var(--border); }
  ul, ol { padding-left: 1.5em; }
</style>
</head>
<body>
<div class="tmd-layout">
  <aside class="tmd-sidebar">
    <h2>Contents</h2>
    {{TOC}}
  </aside>
  <main class="tmd-content">
    {{BODY}}
  </main>
</div>
<script>
(function(){try{var es=new EventSource('/__tmd/events');es.onmessage=function(e){if(e.data==='reload')location.reload();};}catch(_){}})();
</script>
</body>
</html>
