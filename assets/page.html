<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>
  /* --- Dark theme (default) --- */
  :root {
    color-scheme: dark;
    --fg: #e6edf3;
    --muted: #9da7b3;
    --bg: #0d1117;
    --bg-alt: #0a0e14;
    --accent: #58a6ff;
    --border: #30363d;
    --code-bg: #161b22;
    --inline-code-bg: rgba(110, 118, 129, 0.4);
    --inline-code-fg: #f0b3c0;
    --handle-hover: #58a6ff;
  }

  /* --- Light theme --- */
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      color-scheme: light;
      --fg: #1f2328;
      --muted: #656d76;
      --bg: #ffffff;
      --bg-alt: #f6f8fa;
      --accent: #0969da;
      --border: #d0d7de;
      --code-bg: #f6f8fa;
      --inline-code-bg: rgba(175, 184, 193, 0.3);
      --inline-code-fg: #cf222e;
      --handle-hover: #0969da;
    }
  }
  [data-theme="light"] {
    color-scheme: light;
    --fg: #1f2328;
    --muted: #656d76;
    --bg: #ffffff;
    --bg-alt: #f6f8fa;
    --accent: #0969da;
    --border: #d0d7de;
    --code-bg: #f6f8fa;
    --inline-code-bg: rgba(175, 184, 193, 0.3);
    --inline-code-fg: #cf222e;
    --handle-hover: #0969da;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    line-height: 1.6;
  }

  /* --- Two-column layout --- */
  .tmd-layout {
    display: flex;
    min-height: 100vh;
    align-items: stretch;
  }

  .tmd-sidebar {
    flex: 0 0 clamp(120px, 20%, 240px);
    background: var(--bg-alt);
    border-right: 1px solid var(--border);
    font-size: 0.9rem;
    position: relative;
  }
  .tmd-sidebar-inner {
    position: sticky;
    top: 0;
    max-height: 100vh;
    overflow-y: auto;
    padding: 1.2rem 1rem;
  }
  .tmd-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 0 0.6rem 0;
  }
  .tmd-sidebar-header h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0;
    padding: 0;
    border: none;
  }
  .tmd-theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.7rem;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    cursor: pointer;
    line-height: 1;
  }
  .tmd-theme-toggle:hover { color: var(--accent); border-color: var(--accent); }

  .tmd-toc-list { list-style: none; margin: 0; padding: 0; }
  .tmd-toc-list li { margin: 0.1rem 0; line-height: 1.35; }
  .tmd-toc-list a {
    display: block;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    color: var(--fg);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tmd-toc-list a:hover { background: var(--code-bg); color: var(--accent); }
  .tmd-toc-l2 > a { font-weight: 600; }
  .tmd-toc-l3 > a,
  .tmd-toc-l4 > a,
  .tmd-toc-l5 > a,
  .tmd-toc-l6 > a { color: var(--muted); font-size: 0.85rem; }
  .tmd-toc-empty { color: var(--muted); font-style: italic; margin: 0; }

  /* --- Resize handle --- */
  .tmd-resize-handle {
    flex: 0 0 6px;
    cursor: col-resize;
    background: transparent;
    position: relative;
    user-select: none;
    touch-action: none;
    z-index: 2;
  }
  .tmd-resize-handle::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: -4px;
    right: -4px;
  }
  .tmd-resize-handle::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 2px;
    transform: translateX(-50%);
    background: transparent;
    transition: background 0.15s;
  }
  .tmd-resize-handle:hover::after,
  .tmd-resize-handle.active::after { background: var(--handle-hover); }
  body.tmd-resizing,
  body.tmd-resizing * { user-select: none !important; cursor: col-resize !important; }

  /* --- Content area --- */
  .tmd-content {
    flex: 1 1 auto;
    min-width: 0;
    padding: 1.2rem 1.6rem;
  }

  h1, h2, h3, h4 {
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.2em;
    scroll-margin-top: 1rem;
  }
  h1 { font-size: 1.8rem; }
  h2 { font-size: 1.4rem; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    background: var(--inline-code-bg);
    color: var(--inline-code-fg);
    padding: 0.15em 0.4em;
    border-radius: 4px;
    font-size: 0.875em;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  pre {
    background: var(--code-bg);
    padding: 1em;
    border-radius: 6px;
    overflow-x: auto;
    border: 1px solid var(--border);
  }
  pre code {
    background: transparent;
    color: inherit;
    padding: 0;
    font-size: 0.9em;
  }
  blockquote {
    border-left: 3px solid var(--accent);
    margin: 0;
    padding: 0.2em 1em;
    color: var(--muted);
  }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid var(--border); padding: 0.4em 0.8em; }
  img { max-width: 100%; }
  hr { border: none; border-top: 1px solid var(--border); }
  ul, ol { padding-left: 1.5em; }

  @media (max-width: 480px) {
    .tmd-sidebar, .tmd-resize-handle { display: none; }
    .tmd-content { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="tmd-layout">
  <aside class="tmd-sidebar">
    <div class="tmd-sidebar-inner">
      <div class="tmd-sidebar-header">
        <h2>Contents</h2>
        <button class="tmd-theme-toggle" id="themeToggle">Light</button>
      </div>
      {{TOC}}
    </div>
  </aside>
  <div class="tmd-resize-handle" id="resizeHandle"></div>
  <main class="tmd-content">
    {{BODY}}
  </main>
</div>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

function mermaidTheme() {
  var t = document.documentElement.getAttribute('data-theme') ||
    (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  return t === 'dark' ? 'dark' : 'default';
}

function renderMermaid() {
  // Reset any previously rendered diagrams so mermaid.run() picks them up again
  document.querySelectorAll('.mermaid[data-processed]').forEach(function(el) {
    el.removeAttribute('data-processed');
    el.innerHTML = el.getAttribute('data-source');
  });
  mermaid.initialize({ startOnLoad: false, theme: mermaidTheme() });
  mermaid.run({ querySelector: '.mermaid' });
}

// Convert <pre><code class="language-mermaid"> to <div class="mermaid">
document.querySelectorAll('pre > code.language-mermaid').forEach(function(el) {
  var pre = el.parentElement;
  var div = document.createElement('div');
  div.className = 'mermaid';
  div.textContent = el.textContent;
  div.setAttribute('data-source', el.textContent);
  pre.replaceWith(div);
});

renderMermaid();

// Re-render on theme change
window.__tmdRenderMermaid = renderMermaid;
</script>
<script>
(function(){
  // --- SSE live reload ---
  try {
    var es = new EventSource('/__tmd/events');
    es.onmessage = function(e) { if (e.data === 'reload') location.reload(); };
  } catch(_) {}

  // --- Theme toggle ---
  var html = document.documentElement;
  var btn = document.getElementById('themeToggle');
  function currentTheme() {
    return html.getAttribute('data-theme') ||
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  }
  function updateBtn() {
    btn.textContent = currentTheme() === 'dark' ? 'Light' : 'Dark';
  }
  btn.addEventListener('click', function() {
    var next = currentTheme() === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    try { localStorage.setItem('tmd-theme', next); } catch(_) {}
    updateBtn();
    if (window.__tmdRenderMermaid) window.__tmdRenderMermaid();
  });
  var saved = null;
  try { saved = localStorage.getItem('tmd-theme'); } catch(_) {}
  if (saved) html.setAttribute('data-theme', saved);
  updateBtn();

  // --- Resizable sidebar ---
  var handle = document.getElementById('resizeHandle');
  var sidebar = document.querySelector('.tmd-sidebar');
  if (handle && sidebar) {
    var MIN_W = 120;
    function maxW() {
      return Math.max(MIN_W + 40, Math.floor(window.innerWidth * 0.6));
    }
    function applyWidth(w) {
      sidebar.style.flexBasis = w + 'px';
      sidebar.style.maxWidth = w + 'px';
    }
    var startX = 0, startW = 0, pointerId = null;
    function onMove(e) {
      var w = Math.min(maxW(), Math.max(MIN_W, startW + (e.clientX - startX)));
      applyWidth(w);
      try { localStorage.setItem('tmd-sidebar-w', w); } catch(_) {}
      e.preventDefault();
    }
    function onUp(e) {
      handle.classList.remove('active');
      document.body.classList.remove('tmd-resizing');
      if (pointerId !== null) {
        try { handle.releasePointerCapture(pointerId); } catch(_) {}
        pointerId = null;
      }
      handle.removeEventListener('pointermove', onMove);
      handle.removeEventListener('pointerup', onUp);
      handle.removeEventListener('pointercancel', onUp);
    }
    handle.addEventListener('pointerdown', function(e) {
      if (e.button !== undefined && e.button !== 0) return;
      startX = e.clientX;
      startW = sidebar.offsetWidth;
      pointerId = e.pointerId;
      handle.classList.add('active');
      document.body.classList.add('tmd-resizing');
      try { handle.setPointerCapture(e.pointerId); } catch(_) {}
      handle.addEventListener('pointermove', onMove);
      handle.addEventListener('pointerup', onUp);
      handle.addEventListener('pointercancel', onUp);
      e.preventDefault();
    });
    handle.addEventListener('dblclick', function() {
      try { localStorage.removeItem('tmd-sidebar-w'); } catch(_) {}
      sidebar.style.flexBasis = '';
      sidebar.style.maxWidth = '';
    });
    try {
      var sw = parseInt(localStorage.getItem('tmd-sidebar-w'), 10);
      if (sw && sw >= MIN_W) applyWidth(Math.min(maxW(), sw));
    } catch(_) {}
  }
})();
</script>
</body>
</html>
