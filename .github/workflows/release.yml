name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: tar czf tmd-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release tmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmd-${{ matrix.target }}
          path: tmd-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tmd-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute sha256 checksums
        id: checksums
        run: |
          echo "sha256_aarch64_darwin=$(sha256sum tmd-aarch64-apple-darwin.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha256_x86_64_darwin=$(sha256sum tmd-x86_64-apple-darwin.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha256_aarch64_linux=$(sha256sum tmd-aarch64-unknown-linux-musl.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha256_x86_64_linux=$(sha256sum tmd-x86_64-unknown-linux-musl.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          SHA256_AARCH64_DARWIN: ${{ steps.checksums.outputs.sha256_aarch64_darwin }}
          SHA256_X86_64_DARWIN: ${{ steps.checksums.outputs.sha256_x86_64_darwin }}
          SHA256_AARCH64_LINUX: ${{ steps.checksums.outputs.sha256_aarch64_linux }}
          SHA256_X86_64_LINUX: ${{ steps.checksums.outputs.sha256_x86_64_linux }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/johnsonlee/homebrew-tap.git tap
          cd tap

          cat > Formula/tmd.rb <<EOF
          class Tmd < Formula
            desc "Terminal markdown previewer, powered by carbonyl"
            homepage "https://github.com/johnsonlee/tmd"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/johnsonlee/tmd/releases/download/${TAG}/tmd-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA256_AARCH64_DARWIN}"
              end
              on_intel do
                url "https://github.com/johnsonlee/tmd/releases/download/${TAG}/tmd-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA256_X86_64_DARWIN}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/johnsonlee/tmd/releases/download/${TAG}/tmd-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA256_AARCH64_LINUX}"
              end
              on_intel do
                url "https://github.com/johnsonlee/tmd/releases/download/${TAG}/tmd-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA256_X86_64_LINUX}"
              end
            end

            depends_on "johnsonlee/tap/carbonyl"

            def install
              bin.install "tmd"
            end

            test do
              assert_match "tmd", shell_output("#{bin}/tmd --version")
            end
          end
          EOF
          # Strip leading whitespace from the generated formula
          sed -i 's/^          //' Formula/tmd.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tmd.rb
          git commit -m "tmd ${VERSION}"
          git push
